<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f5f4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="128" />
  
  <!-- Inner Border Ring -->
  <rect x="32" y="32" width="448" height="448" fill="none" stroke="#e7e5e4" stroke-width="4" rx="104" />

  <!-- Monogram -->
  <text x="256" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="240" font-style="italic" fill="#000000" text-anchor="middle" letter-spacing="-16">
    bd
  </text>
  
  <!-- Subtle Detail -->
  <path d="M 220 380 L 292 380" stroke="#78716c" stroke-width="3" stroke-linecap="round"/>
</svg>
